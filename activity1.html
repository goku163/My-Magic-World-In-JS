<!DOCTYPE html>

<html>

<head>

    <title>My Magic Word Lab</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        body {

            background: lightyellow;

        }

        h1,

        h3 {

            color: darkorange;

        }

        .box {

            background: white;

            color: darkorange;

        }
    </style>
</head>

<body>
    <div class="container py-4">
        <h1 class="mb-1">My Magic World Lab</h1>
        <P class="text-muted mb-4">Discover types, switch them, find and swap words, and catch sneaky errors!</P>
        <!-- TOPIC 1: typeof -->
        <div class="card mb-4">
            <div class="card-body">
                <h3 class="card-title">What Is It?</h3>
                <button class="btn btn-warning" onclick="checkTypes()">Reveal The Types!</button>
                <div id="typeResult" class="box p-3 mt-3 rounded">Press The Button To Reveal The Secret Types!</div>
             </div>
        </div>
        <!-- TOPIC 2 : String() and Number() -->
        <div class="card mb-4">
            <div class="card-body">
                <h3 class="card-title">Switch the Type </h3>
                <input id="numIn" class="form-control mb-2" placeholder="Type any number here (try: 42)">
                <button class="btn btn-warning mr-2" onclick="toStr()">Turn into Text</button>
                <button class="btn btn-warning mr-2" onclick="toNum()">Turn into Number</button>
                <div id="convResult" class="p-3 mt-3 rounded">Type a number above than press a button</div>

        
                
            </div>
        </div>
        <!-- TOPIC 3: search() and replace() -->
         <div class="card-body">
            <h3 class="card-title">Find and swap a word</h3>
            <input id="findW" class="form-control mb-2" placeholder="word to find(try: dragon)">
            <button class="btn btn-warning mr-2" onclick="doSearch()">Find It</button>
            <button class="btn btn-warning mr-2" onclick="doReplace()">Swap It</button>
            
         </div>    </div>
    <script>
        function checkTypes() {
            document.getElementById("typeResult").innerText =
                 "Score 42         - type: " + typeof 42 +
                 "\n" +        
                 "Name 'Alex'      - type: " + typeof "Alex" +
                 "\n" +
                 "Game over true   - type: " + typeof true ;
        }

        function toStr()
        {

            var v = document.getElementById("numIn").value;
            document.getElementById("convResult").innerHTML = "String(" + v +") = '" + String(v) + "' - now it is a: " + typeof String(v);
        }
        function toNum() 
        {

             var v = document.getElementById("numIn").value;
            document.getElementById("convResult").innerHTML = "Number(" + v + ") = '" + Number(v) + "' - now it is a: " + typeof Number(v);
        }
        
             
    </script>
</body>
